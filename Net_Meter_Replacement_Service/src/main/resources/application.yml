server:
  port: 8081

spring:

  application:
    name: Maitri-Solar-Net-To-Normal-Meter

  profiles:
    active: dev


    hikari:

      maximum-pool-size: 20

      minimum-idle: 5

      connection-timeout: 250

      idle-timeout: 300000

      max-lifetime: 1800000

      leak-detection-threshold: 60000

      pool-name: MaitriSolarHikariPool

      connection-test-query: SELECT 1 FROM DUAL

  jackson:
    serialization:
      indent-output: true

  task:
    execution:
      pool:

        core-size: 2

        max-size: 5

        queue-capacity: 100

logging:

  level:
    "com.msedcl": DEBUG
    "org.springframework": INFO
    "com.zaxxer.hikari": INFO

  pattern:

    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

management:

  endpoints:
    web:
      exposure:
        include: health,info,metrics

  endpoint:
    health:
      show-details: always

springdoc:

  api-docs:
    path: /v3/api-docs

  swagger-ui:
    path: /swagger-ui.html